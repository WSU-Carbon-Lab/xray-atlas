version: 1
backend:
  phases:
    build:
      commands:
        - echo "No backend build"
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    # Use the standard Next.js output directory instead of 'out'
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
