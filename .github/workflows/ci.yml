name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck-and-unit:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        env:
          # prisma.config.ts calls env("DIRECT_URL"); generate does not open a DB.
          DIRECT_URL: postgresql://prisma:prisma@127.0.0.1:5432/prisma?schema=public
          DATABASE_URL: postgresql://prisma:prisma@127.0.0.1:5432/prisma?schema=public
        run: bunx prisma generate

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (src)
        run: bun test src/server/zenodo src/lib/dataset-citation.test.ts src/lib/atlas-dataset-id.test.ts src/lib/nexafs-experiment-deep-link.test.ts src/lib/datacite-contributor-types.test.ts src/server/nexafs/atlas-dataset-id.test.ts
