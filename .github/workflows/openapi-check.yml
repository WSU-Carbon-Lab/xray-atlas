name: OpenAPI Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  openapi-check:
    name: OpenAPI lint and validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run OpenAPI checks
        run: bun run openapi:check
